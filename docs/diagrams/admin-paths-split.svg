<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Production path vs Demo path</title>
  <desc id="desc">Production admin uses Server Actions and works.json. Demo admin is client-only with localStorage.</desc>
  <defs>
    <style>
      .box { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
      .title { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #24292f; }
      .label { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #57606a; }
      .code { font: 13px ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; fill: #0969da; }
      .arrow { stroke: #8c959f; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8c959f"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="20" width="310" height="180" rx="8"/>
  <text class="title" x="40" y="48">Production</text>
  <text class="code" x="40" y="78">/admin</text>
  <line class="arrow" x1="110" y1="74" x2="150" y2="74"/>
  <text class="label" x="160" y="78">Server Actions</text>
  <line class="arrow" x1="40" y1="98" x2="40" y2="112"/>
  <text class="code" x="56" y="126">works.json</text>
  <line class="arrow" x1="40" y1="138" x2="40" y2="152"/>
  <text class="label" x="56" y="172">sharp (resize variants)</text>

  <rect class="box" x="390" y="20" width="310" height="180" rx="8"/>
  <text class="title" x="410" y="48">Demo</text>
  <text class="code" x="410" y="78">/demo/admin</text>
  <line class="arrow" x1="520" y1="74" x2="560" y2="74"/>
  <text class="label" x="570" y="78">Client only</text>
  <line class="arrow" x1="410" y1="98" x2="410" y2="112"/>
  <text class="code" x="426" y="126">localStorage</text>
  <line class="arrow" x1="410" y1="138" x2="410" y2="152"/>
  <text class="label" x="426" y="172">Canvas (compress)</text>
</svg>
